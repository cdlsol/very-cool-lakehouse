x-image:
   &image
   image: ${OZONE_IMAGE:-apache/ozone}:${OZONE_IMAGE_VERSION:-2.1.1}${OZONE_IMAGE_FLAVOR:-}

x-common-config:
   &common-config
   OZONE-SITE.XML_hdds.datanode.dir: "/data/hdds"
   OZONE-SITE.XML_ozone.metadata.dirs: "/data/metadata"
   OZONE-SITE.XML_ozone.om.address: "om"
   OZONE-SITE.XML_ozone.om.http-address: "om:9874"
   OZONE-SITE.XML_ozone.recon.address: "recon:9891"
   OZONE-SITE.XML_ozone.recon.db.dir: "/data/metadata/recon"
   OZONE-SITE.XML_ozone.replication: "1"
   OZONE-SITE.XML_ozone.scm.block.client.address: "scm"
   OZONE-SITE.XML_ozone.scm.client.address: "scm"
   OZONE-SITE.XML_ozone.scm.datanode.id.dir: "/data/metadata"
   OZONE-SITE.XML_ozone.scm.names: "scm"
   no_proxy: "om,recon,scm,s3g,localhost,127.0.0.1"

services:
   datanode:
      <<: *image
      ports:
         - 9864
      command: ["ozone","datanode"]
      environment:
         <<: *common-config
   om:
      <<: *image
      volumes:
         - ../platform:/workspace
      ports:
         - 9874:9874
      environment:
         <<: *common-config
         CORE-SITE.XML_hadoop.proxyuser.hadoop.hosts: "*"
         CORE-SITE.XML_hadoop.proxyuser.hadoop.groups: "*"
         ENSURE_OM_INITIALIZED: /data/metadata/om/current/VERSION
         WAITFOR: scm:9876
      command: ["ozone","om"]
   scm:
      <<: *image
      ports:
         - 9876:9876
      environment:
         <<: *common-config
         ENSURE_SCM_INITIALIZED: /data/metadata/scm/current/VERSION
      command: ["ozone","scm"]
   recon:
      <<: *image
      ports:
         - 9888:9888
      environment:
         <<: *common-config
      command: ["ozone","recon"]
   s3g:
      <<: *image
      ports:
         - 9878:9878
      environment:
         <<: *common-config
      command: ["ozone","s3g"]
   httpfs:
      <<: *image
      ports:
         - 14000:14000
      environment:
         <<: *common-config
         CORE-SITE.XML_fs.defaultFS: "ofs://om"
      command: [ "ozone","httpfs" ]
   spark-master:
      image: apache/spark:3.5.1
      container_name: spark-master
      hostname: spark-master
      ports:
         - "8080:8080"
         - "7077:7077"
      environment:
         - SPARK_MASTER_HOST=spark-master
         - SPARK_MASTER_PORT=7077
         - SPARK_MASTER_WEBUI_PORT=8080
      entrypoint:
         - "bash"
         - "-c"
         - "/opt/spark/sbin/start-master.sh && tail -f /dev/null"
      volumes:
         - ./data:/opt/spark/work-dir/spark-warehouse/data:rw
   spark-connect:
      image: apache/spark:3.5.1
      container_name: spark-connect
      hostname: spark-connect
      ports:
         - "4040:4040"
         - "15002:15002"
      depends_on:
         - spark-master
      volumes:
         - ./data:/opt/spark/work-dir/spark-warehouse/data:rw
         - ./jars/ozone-filesystem-hadoop3-client-1.4.0.jar:/opt/spark/jars/ozone-filesystem-hadoop3-client-1.4.0.jar:ro
         - ./jars/iceberg-spark-runtime-3.5_2.12-1.7.2.jar:/opt/spark/jars/iceberg-spark-runtime-3.5_2.12-1.7.2.jar:ro
      command:
         - "bash"
         - "-c"
         - >
            /opt/spark/sbin/start-connect-server.sh
            --packages org.apache.spark:spark-connect_2.12:3.5.1
            --master spark://spark-master:7077
            --conf spark.jars.ivy=/tmp/.ivy2
            --conf spark.hadoop.fs.ofs.impl=org.apache.hadoop.fs.ozone.RootedOzoneFileSystem
            --conf spark.hadoop.ozone.om.address=om:9862
            --conf spark.sql.extensions=org.apache.iceberg.spark.extensions.IcebergSparkSessionExtensions
            --conf spark.sql.catalog.lakehouse=org.apache.iceberg.spark.SparkCatalog
            --conf spark.sql.catalog.lakehouse.type=hadoop
            --conf spark.sql.catalog.lakehouse.warehouse=ofs://om/lakehouse
            && tail -f /dev/null
   spark-worker:
      image: apache/spark:3.5.1
      container_name: spark-worker
      hostname: spark-worker
      depends_on:
         - spark-master
      volumes:
         - ./data:/opt/spark/work-dir/spark-warehouse/data:rw
         - ./jars/ozone-filesystem-hadoop3-client-1.4.0.jar:/opt/spark/jars/ozone-filesystem-hadoop3-client-1.4.0.jar:ro
         - ./jars/iceberg-spark-runtime-3.5_2.12-1.7.2.jar:/opt/spark/jars/iceberg-spark-runtime-3.5_2.12-1.7.2.jar:ro
      entrypoint:
         - "bash"
         - "-c"
         - "/opt/spark/sbin/start-worker.sh spark://spark-master:7077 && tail -f /dev/null"